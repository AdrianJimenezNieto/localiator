# Nginx que sirve la SPA (build estático de Vite). Ligero y seguro para una SPA.
# El reverse proxy externo (Nginx Proxy Manager, tarea 09) pone HTTPS/SSL delante;
# este nginx interno solo sirve los ficheros.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida devuelve index.html para que el router del
    # cliente (React Router) resuelva la navegación. Sin esto, recargar en
    # /productos/xxx daría 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo largo de los assets con hash en el nombre (los genera Vite); son
    # inmutables, así que se pueden cachear de forma agresiva.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
