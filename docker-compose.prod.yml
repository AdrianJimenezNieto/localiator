# Compose de PRODUCCIÓN (Fase 4, tarea 09). A diferencia del docker-compose.yml de
# desarrollo (que solo levanta Postgres), aquí corren los tres servicios: base de
# datos, API y web, construidos desde sus Dockerfiles.
#
# Delante va Nginx Proxy Manager (fuera de este compose) con el dominio y el SSL de
# Let's Encrypt. NPM vive en la red Docker externa `web`, compartida por todas las
# webs del VPS, y alcanza cada servicio por su `container_name` (p. ej.
# `localiator-web:80`, `localiator-api:3000`). Por eso `api` y `web` se unen a esa
# red; la base de datos queda aislada en una red interna. Los secretos vienen de
# .env.production (fuera del repo; en el VPS symlinkeado como .env para que compose
# lo use también en la interpolación de ${...}).

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Solo en la red interna: la BD no es alcanzable desde NPM ni desde otras webs.
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # image + build: en el VPS se hace `pull` de la imagen etiquetada por SHA que
    # publica el CD (tarea 10); IMAGE_TAG fija qué versión corre (rollback = cambiar
    # el tag y volver a `up`). El `build` permite además construir en local/VPS.
    image: ghcr.io/adrianjimeneznieto/localiator-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: localiator-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Fotos subidas por el admin: persisten fuera del contenedor (UPLOAD_DIR).
      - uploads:/repo/apps/api/uploads
    # `internal` para hablar con la BD; `web` para que NPM la proxee por nombre
    # (api.localiator.com → localiator-api:3000).
    networks:
      - internal
      - web
    expose:
      - '3000'
    # Reutiliza el /health ya existente en la API para saber si está viva.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    # Publicado solo en loopback del host: lo usa el health-check del CD
    # (curl 127.0.0.1:3000/health por SSH). NPM no lo necesita (entra por la red).
    ports:
      - '127.0.0.1:3000:3000'

  web:
    image: ghcr.io/adrianjimeneznieto/localiator-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # URL pública de la API (se inyecta en el build de Vite). Debe apuntar al
        # dominio real de la API en producción (https://api.localiator.com).
        VITE_API_URL: ${VITE_API_URL}
    container_name: localiator-web
    restart: unless-stopped
    depends_on:
      - api
    # Solo en `web`: NPM la proxea por nombre (localiator.com → localiator-web:80).
    networks:
      - web
    expose:
      - '80'

networks:
  # Red compartida del VPS donde vive Nginx Proxy Manager y el resto de webs. Ya
  # existe (creada fuera de este compose), por eso `external: true`.
  web:
    external: true
  # Red privada de este proyecto: solo api ↔ db.
  internal:

volumes:
  pgdata:
  uploads:
