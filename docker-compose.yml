# Entorno de desarrollo. Levanta PostgreSQL; el backend y el frontend se ejecutan en local
# con `pnpm dev` (HMR rápido). Los Dockerfile de api/web y el compose de producción se
# añaden en la Fase 4 (despliegue).
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-localiator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-localiator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localiator}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  # Fotos del catálogo subidas por el admin. En dev la API corre en local y escribe
  # en ./apps/api/uploads (gitignored); este volumen queda declarado para cuando la
  # API se contenedorice en Fase 4, montándolo en UPLOAD_DIR para que las fotos
  # persistan al recrear el contenedor.
  uploads:
