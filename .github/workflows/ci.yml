name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: localiator
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: localiator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localiator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://localiator:changeme@localhost:5432/localiator_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @localiator/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Auditoría de vulnerabilidades de dependencias (tarea 11). Falla el pipeline si
  # hay vulnerabilidades ALTAS o CRÍTICAS. Job aparte: no necesita BD y corre en
  # paralelo al build. Los falsos positivos justificados se pueden silenciar con
  # pnpm.auditConfig.ignoreGhsas en pnpm-workspace.yaml (ver docs/dependencies.md).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (fail on high/critical)
        run: pnpm audit --audit-level=high
