# Despliegue continuo (Fase 4, tarea 10). Se dispara SOLO cuando el workflow de CI
# termina en VERDE sobre main (workflow_run + conclusion == success): nunca despliega
# una rama rota. Construye imágenes etiquetadas por SHA, las publica en GHCR y las
# despliega en el VPS por SSH, con health-check y rollback a la release anterior.
name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# Permisos mínimos: leer el repo y publicar paquetes (imágenes) en GHCR.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/adrianjimeneznieto

jobs:
  build-and-push:
    # Solo si la CI que disparó esto acabó en verde Y el CD está habilitado. El
    # interruptor `DEPLOY_ENABLED` (variable de repo) evita que el CD corra —y
    # publique imágenes o intente el SSH— antes de configurar el VPS y sus secretos.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
      vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # El tag de la release = SHA del commit que pasó la CI. Es la clave del
      # rollback determinista (cada release es una imagen concreta).
      - name: Calcular tag
        id: vars
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/localiator-api:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/localiator-api:latest

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/localiator-web:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/localiator-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # `environment` permite exigir aprobación manual y aislar secretos de producción.
    environment: production
    steps:
      - name: Desplegar en el VPS por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Pasamos el tag nuevo al script remoto.
          envs: IMAGE_TAG
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_DIR }}
            git fetch --all --quiet
            git checkout main --quiet
            git pull --ff-only --quiet

            NEW_TAG="$IMAGE_TAG"
            PREV_TAG="$(cat .last_good_tag 2>/dev/null || echo latest)"
            echo "Desplegando $NEW_TAG (anterior estable: $PREV_TAG)"

            export IMAGE_TAG="$NEW_TAG"
            docker compose -f docker-compose.prod.yml pull api web
            docker compose -f docker-compose.prod.yml up -d

            # Health-check: esperamos a que la API responda /health.
            ok=0
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then ok=1; break; fi
              sleep 3
            done

            if [ "$ok" = "1" ]; then
              echo "$NEW_TAG" > .last_good_tag
              echo "Deploy OK ($NEW_TAG)"
            else
              echo "Health-check FALLÓ; rollback a $PREV_TAG"
              export IMAGE_TAG="$PREV_TAG"
              docker compose -f docker-compose.prod.yml up -d
              exit 1
            fi
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
